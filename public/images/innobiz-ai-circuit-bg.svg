<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1050" viewBox="0 0 2400 1050">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="42%">
      <stop offset="0" stop-color="#0a7cff" stop-opacity="0.52"/>
      <stop offset="0.24" stop-color="#053b8c" stop-opacity="0.28"/>
      <stop offset="0.72" stop-color="#030814" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="15%" cy="18%" r="38%">
      <stop offset="0" stop-color="#059cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="86%" cy="24%" r="42%">
      <stop offset="0" stop-color="#1a4fff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace" x1="0" x2="1">
      <stop offset="0" stop-color="#073a72" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#1db9ff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#073a72" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#0d8cff" stop-opacity="0.05"/>
      <stop offset="0.5" stop-color="#30d9ff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0a4dff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <pattern id="microgrid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#3dd7ff" stroke-opacity="0.045" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#56dbff" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="2400" height="1050" fill="#02050c"/>
  <rect width="2400" height="1050" fill="url(#microgrid)" opacity="0.68"/>
  <rect width="2400" height="1050" fill="url(#core)"/>
  <rect width="2400" height="1050" fill="url(#leftGlow)"/>
  <rect width="2400" height="1050" fill="url(#rightGlow)"/>

  <!-- blurred hardware blocks -->
  <g opacity="0.52" filter="url(#soft)">
    <rect x="80" y="120" width="240" height="150" rx="18" fill="#0a1728" stroke="#1d77d2" stroke-opacity="0.18"/>
    <rect x="170" y="680" width="330" height="140" rx="18" fill="#061326" stroke="#1d77d2" stroke-opacity="0.18"/>
    <rect x="1980" y="100" width="300" height="170" rx="20" fill="#0a1728" stroke="#1d77d2" stroke-opacity="0.16"/>
    <rect x="1835" y="720" width="410" height="120" rx="20" fill="#07101f" stroke="#1d77d2" stroke-opacity="0.18"/>
    <circle cx="2180" cy="395" r="58" fill="#071326" stroke="#1d77d2" stroke-opacity="0.18"/>
    <circle cx="2150" cy="390" r="28" fill="#02050c" opacity="0.7"/>
  </g>

  <!-- central chip platform -->
  <g transform="translate(1200 385)" filter="url(#glow)">
    <path d="M0-150 250-34 250 78 0 196-250 78-250-34Z" fill="#031222" fill-opacity="0.72" stroke="#29cfff" stroke-opacity="0.72" stroke-width="4"/>
    <path d="M0-106 175-24 175 52 0 136-175 52-175-24Z" fill="#061a34" fill-opacity="0.48" stroke="#108cff" stroke-opacity="0.56" stroke-width="3"/>
    <path d="M-88-18 0-58 88-18 88 28 0 72-88 28Z" fill="#09254d" fill-opacity="0.7" stroke="#53e8ff" stroke-opacity="0.8" stroke-width="2"/>
    <path d="M-155-24h-370M155-24h370M-175 52h-520M175 52h520M-95 112l-160 110M95 112l160 110" fill="none" stroke="url(#edge)" stroke-width="6" stroke-linecap="round" opacity="0.82"/>
    <path d="M-230-65l-280-155H-760M230-65l280-155h250M-230 95l-340 185h-290M230 95l340 185h290" fill="none" stroke="#158cff" stroke-width="2.6" stroke-opacity="0.46"/>
  </g>

  <!-- circuit traces -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 494H410l92-68h270l106-78h128" stroke="url(#trace)" stroke-width="7" filter="url(#glow)"/>
    <path d="M2400 474h-435l-100 72h-320l-112-86h-105" stroke="url(#trace)" stroke-width="7" filter="url(#glow)"/>
    <path d="M0 610h520l88 78h260l64 62h112" stroke="#138cff" stroke-opacity="0.62" stroke-width="3"/>
    <path d="M2400 623h-510l-98 82h-290l-68 56h-96" stroke="#17b8ff" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M270 260h450l78 64h170" stroke="#1fbfff" stroke-opacity="0.42" stroke-width="3"/>
    <path d="M2128 260h-410l-98 64h-178" stroke="#1fbfff" stroke-opacity="0.34" stroke-width="3"/>
    <path d="M430 810h360l80-86h116" stroke="#0f7eff" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M1964 820h-370l-86-92h-116" stroke="#0f7eff" stroke-opacity="0.48" stroke-width="3"/>
  </g>

  <!-- node lights -->
  <g filter="url(#glow)">
    <circle cx="520" cy="494" r="8" fill="#54e6ff"/>
    <circle cx="765" cy="426" r="6" fill="#4ddcff" opacity="0.84"/>
    <circle cx="1645" cy="546" r="8" fill="#54e6ff"/>
    <circle cx="1888" cy="474" r="6" fill="#4ddcff" opacity="0.76"/>
    <circle cx="600" cy="688" r="5" fill="#278bff"/>
    <circle cx="1826" cy="704" r="5" fill="#278bff"/>
    <circle cx="1200" cy="235" r="6" fill="#57e9ff"/>
    <circle cx="1244" cy="262" r="4" fill="#57e9ff" opacity="0.8"/>
    <circle cx="1160" cy="262" r="4" fill="#57e9ff" opacity="0.8"/>
  </g>

  <!-- vertical data spikes -->
  <g stroke="#54e6ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M1200 230V70" opacity="0.64"/>
    <path d="M1158 262V120" opacity="0.45"/>
    <path d="M1245 262V104" opacity="0.45"/>
    <path d="M1118 304V178" opacity="0.28"/>
    <path d="M1284 304V178" opacity="0.28"/>
  </g>

  <g fill="#fff" opacity="0.22">
    <circle cx="1018" cy="150" r="2"/>
    <circle cx="1065" cy="126" r="2"/>
    <circle cx="1330" cy="142" r="2"/>
    <circle cx="1390" cy="166" r="2"/>
    <circle cx="930" cy="214" r="1.7"/>
    <circle cx="1490" cy="230" r="1.7"/>
  </g>

  <rect width="2400" height="1050" fill="url(#core)" opacity="0.18"/>
  <rect width="2400" height="1050" fill="black" opacity="0.22"/>
</svg>
